# Site settings
title: Johnattan Garcia Ruiz
description: >-
  Global Health Consultant | Director @Decilion | Harvard MPH | Oxford MBA.
  Specializing in pharmaceutical policy, health systems, digital communication,
  and access to medicines in Latin America and the Caribbean.

author:
  name: Johnattan Garcia Ruiz
  credentials: MPH, MBA, LL.B.
  email: j.garcia@decilion.com
  twitter: GarciaRuizJo
  linkedin: johnattangarcia
  google_scholar: 7JZVw_YAAAAJ
  website: https://decilion.com/
  substack: https://garciaruizjo.substack.com

# Build settings
baseurl: ""
url: "https://j-garciaruiz.github.io"

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - bundle_install.log
  - jekyll.log

# Include
include:
  - _pages

# Site navigation
navigation:
  - title: About
    url: "/#about"
  - title: Education
    url: "/#education"
  - title: Publications
    url: "/publications.html"
  - title: Experience
    url: "/#experience"
  - title: Writing
    url: "https://garciaruizjo.substack.com"
    external: true
